# ADoTA Model Evaluation Configuration
# ======================================
# This YAML file configures the run_model.py evaluation script.
# All options correspond to the CLI arguments and can be overridden
# by passing CLI flags (CLI takes precedence over YAML values).
#
# Usage:
#   uv run python scripts/run_model.py --config scripts/config_run_model.yaml
#
# A copy of this file is saved in the run directory for reproducibility.

# --- Required Arguments ---

# Name of the model directory (located in models/)
model_name: DoTA_v3_grid_search_v11

# Path to the directory with input data to evaluate
test_data: /scratch/mstryja/DoTA_dataset_v2/testset_Lung-PET-CT-Dx_v2 # pelvis_abdominal_testset_paper #/scratch/mstryja/DoTA_dataset_v2/fixed_theta_y_StageII-Colorectal-CT_v0 # /scratch/mstryja/DoTA_dataset_v2/fixed_theta_y_Lung-PET-CT-Dx_v0 #

# --- Optional Settings ---

# Downsampling method: 'interpolation' or 'avg_pooling'
downsampling_method: interpolation

# Model filename within the model directory
model_fname: best_model.pth

# CUDA device index (-1 for CPU)
device_index: 1

# Dose percent threshold for gamma calculation
dose_threshold: 2.0

# Distance threshold (mm) for gamma calculation
distance_threshold: 2.0

# Disable progress bar
no_progress: false

# Enable verbose/debug output
verbose: false
