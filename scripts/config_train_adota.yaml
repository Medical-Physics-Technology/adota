# ============================================================
# ADoTA Training Config (scripts/train_adota.py)
# ============================================================
#
# Usage:
#   uv run python scripts/train_adota.py --config scripts/config_train_adota.yaml
#
# CLI flags override values defined here. The resolved config is
# copied verbatim into the run directory together with a reproducibility
# manifest (git commit, library versions, GPU info, dataset fingerprint).
# ============================================================

# ── Run identification ──────────────────────────────────────
config_name: dota_v3_ft_anneal_from_best

# ── Data ────────────────────────────────────────────────────
dataset_path: /scratch/mstryja/DoTA_dataset_v2/trainset_pelvis_initial_test_one_ct_downsampled_v2_all_SingleGaussian.h5
excluded_indexes_file: /home/mstryja/projects/dota_pytorch/auxilary_files/IndexesExclude_trainset_pelvis_initial_test_one_ct_downsampled_v2_all_SingleGaussian.txt
train_test_split: 0.2
split_random_state: 42

# Dose / CT / energy MinMax scaling. These MUST match the scaling
# used when generating the H5 dataset.
scale:
  min_ds: 0.0
  max_ds: 25277028.0
  min_ct: -1024
  max_ct: 3071
  min_energy: 70.0
  max_energy: 270.0

# ── DataLoader ──────────────────────────────────────────────
# The baseline used 21.6 GB at batch 56 (eager) on the 44 GB A40; torch.compile
# adds memory overhead on top, so batch 56 is the safe, proven choice that
# leaves headroom for the compiled graph. Do not raise without checking the
# logged gpu_mem under compile (batch ~160 OOMs).
batch_size: 56
num_workers: 4
augmentation: true
normalize_flux_only: true

# ── Optimization ────────────────────────────────────────────
# Warm-start anneal from the baseline best (ep131, val 8.43e-3). The baseline
# never annealed (lr 5e-4 -> 2.4e-4 over 232 ep) and its val curve stayed
# noisy at high LR. Here we start low and let ReduceLROnPlateau drop hard.
num_epochs: 200            # capped; the 12h budget bounds the run
learning_rate: 0.00015     # low: fine-tuning a good model, not exploring (was 5e-4)
weight_decay: 0.003        # up from 1e-3 to close the small train/val gap
patience: 40               # early-stop; do not idle the night after a plateau
seed: 1234
device_index: 1            # override on the CLI to pick a free GPU

# ReduceLROnPlateau scheduler: a real anneal (baseline's 0.9 / 20 was too gentle)
lr_factor: 0.5
lr_patience: 8

# ── Acceleration (opt-in) ───────────────────────────────────
# torch.compile fuses the forward/backward for a large speedup. The first
# epoch is slower (one-time compilation warmup); steady-state epochs are
# faster. allow_tf32 enables TF32 matmul/conv kernels on Ampere+ (small
# numeric change, large throughput gain). Both relax cuDNN determinism.
compile: true
compile_mode: default   # default | reduce-overhead | max-autotune
allow_tf32: true

# ── Loss balancing ──────────────────────────────────────────
initial_weight_mse: 0.7
initial_weight_ps: 0.3
balancer_smoothing: 0.9
# Set this <= num_epochs to enable adaptive balancing; default
# disables it (matches the legacy script's effective behavior).
adaptive_after_epoch: 10000

# LPS pixel spacing (mm). Drives the IDD pixel-area weighting.
lps_dx_mm: 2.0
lps_dy_mm: 2.0

# ── Validation cadence ──────────────────────────────────────
# RMSE / MAPE / RDE every epoch on the full val set.
# Gamma every N epochs on a fixed nested pool (it is expensive): a stable
# pool of gpr_subset_size, with a nested gpr_comparable_size subset reported
# separately for apples-to-apples comparison with prior runs. The pool is
# frozen before the loop and written to run_dir/gpr_samples.json (and
# inherited automatically on --resume-from). gpr_samples_file pins an exact
# set; empty => draw fresh and persist.
gpr_every_n_epochs: 10
gpr_subset_size: 50
gpr_comparable_size: 20
gpr_samples_file: ""

gamma_params:
  dose_percent_threshold: 2
  distance_mm_threshold: 2
  interp_fraction: 10
  max_gamma: 2
  lower_percent_dose_cutoff: 10
  random_subset: null
  local_gamma: false
  quiet: true

gpr_resolution_mm: [2.0, 2.0, 2.0]

# Per-energy validation breakdown
energy_bins_fixed:
  - 70.0
  - 80.0
  - 90.0
  - 100.0
  - 110.0
  - 120.0
  - 130.0
  - 140.0
  - 150.0
  - 160.0
  - 170.0
  - 180.0
  - 190.0
  - 200.0
  - 210.0
  - 220.0
  - 230.0
  - 240.0
  - 250.0
  - 260.0
  - 270.0
energy_bins_quantile_n: 10

# ── Worst-case sample tracking ─────────────────────────────
worst_k_samples: 10

# ── Checkpoint retention ───────────────────────────────────
# best.pth + last.pth always; epoch_NNNN.pth every K epochs.
checkpoint_every_n_epochs: 10

# ── Attention canary ───────────────────────────────────────
# Saves attention maps from a fixed val sample every K epochs.
# Skipped silently when num_transformers == 0.
attention_every_n_epochs: 10

# ── Run-control flags (overridable via CLI) ────────────────
max_hours: 12        # wall-time budget (hours); null = no limit
smoke_test: false    # true = 2 epochs, 4 batches/epoch, exit
resume_from: null    # path to a previous checkpoint .pth (use --resume-from)
weights_only: false  # warm-start: load weights only (use --weights-only)

# ── Model hyperparameters ──────────────────────────────────
input_shape: [2, 160, 30, 30]
num_transformers: 1
num_heads: 4
# Feed-forward hidden dim of the transformer layers.
# null = use the model's token_size (original behavior).
dim_feedforward: null
num_levels: 4
enc_features: 32
kernel_size: 3
convolutional_steps: 2
conv_hidden_channels: 64
dropout_rate: 0.1
causal: true
zero_padding: true
last_activation: false
num_forward: 2

# Convolutional regularization. Defaults reproduce the original architecture.
# weight_standardization: per-filter weight standardization in convs.
# norm_layer: batch | group | none  (group pairs naturally with WS).
# weight_init: default | kaiming | xavier.
weight_standardization: false
norm_layer: batch
weight_init: default

# ── Free-form notes ────────────────────────────────────────
comment: "Warm-start anneal from baseline best (ep131, val 8.43e-3); compile+TF32"
