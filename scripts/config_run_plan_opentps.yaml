# ADoTA End-to-End Plan Pipeline Configuration
# =============================================
# Configures scripts/run_plan_opentps.py. Every key corresponds to a CLI
# option and can be overridden on the command line (CLI takes precedence).
#
# Usage:
#   uv run python scripts/run_plan_opentps.py --config scripts/config_run_plan_opentps.yaml
#
# A copy of this file is saved in the run directory for reproducibility.

# --- Required ---

# OpenTPS plan directory: CT.mhd, PlanPencil.txt, bdl.txt, config.txt,
# structure masks (target.mhd / OAR_*.mhd), and the MC reference Dose.mhd.
plan_dir: /scratch/mstryja/opentps_plans/Prostate-AEC-004_4mm_target_margin

# Model directory name under models/.
model_name: DoTA_v3_grid_search_v11

# --- Optional ---

# Model weights filename within the model directory.
model_fname: best_model.pth

# Beam data library path. Leave null to use the plan-local bdl.txt
# (the BDL is fine-tuned and request-only; it is not committed to the repo).
bdl_path: null

# CUDA device index (-1 for CPU).
device_index: 1

# Base directory for run outputs (kept on /scratch, never under /home).
runs_dir: /scratch/mstryja/tmp_adota/runs

# Preview verbosity: how much of the parsed plan tree to expand.
max_fields: 10
max_control_points: 10000

# --- Pipeline stages ---

# Comma-separated stages to run end to end.
# extract  -> per-spot CT crops + flux projections under adota_beamlets/
# infer    -> batched ADoTA inference -> {id}_ds_pred.npy
# accumulate -> deposit predicted dose back into the grid -> Dose_ADoTA.mhd
# gamma    -> plan gamma pass rate (per criterion) + MAPE/RMSE/RDE metrics +
#             gamma_comparison figure; runs after the timing table, reusing
#             Dose_ADoTA.mhd (can run standalone if accumulate already ran).
# ("compare" against the MC Dose.mhd is a later stage.)
stages: extract,infer,accumulate #,gamma

# Subset controls for cheap runs (null = all).
# n_spots: extract only the first N spots (global order).
# beams: comma-separated beam (field) indices, e.g. "0".
n_spots: null
beams: null

# Allow re-extracting into a non-empty <plan_dir>/adota_beamlets/ directory.
overwrite: true

# Skip the per-field overlay PNGs (visual sanity check).
no_overlays: true

# Extraction: compute the per-spot flux projection on the GPU (flux_projection_gpu)
# instead of NumPy. Numerically identical (float64; proven by tests/beamlets/
# test_flux_gpu.py); purely a speed option. Uses the device from device_index.
flux_on_gpu: true

# Extraction parallelism. false -> run_extraction (serial reference, kept for
# comparison). true -> run_extraction_pooled (thread pool over each field's spots;
# bit-identical output, proven by tests/beamlets/test_extraction_pooled.py).
# extraction_workers: thread count (0 = auto, min(32, os.cpu_count())).
extraction_parallel: true
extraction_workers: 0

# Inference: spots per forward pass (batched on the GPU).
batch_size: 56

# Accumulation: which per-spot array to deposit as "dose".
# Leave null to auto-select: "prediction" (the ADoTA model output) when the
# infer stage runs, otherwise "flux" (the constructed flux projection stand-in).
# Set explicitly to "flux" or "prediction" to force.
dose_source: null

# Dose calibration (optional). The model systematically under-predicts each
# beamlet's integral by ~2.8% (measured on held-out beamlets, std <1%), which
# accumulates into a ~2.8% plan-level target underdosage. When enabled, the
# accumulated dose is multiplied by dose_calibration_factor before Dose_ADoTA.mhd
# is written, so the figure, DVH and gamma all use the calibrated dose.
# Disabled by default -> the pipeline is unchanged. ~1.029 = 1 / 0.972.
dose_calibration_enabled: false
dose_calibration_factor: 1.029

# --- Gamma stage ---

# Gamma pass-rate criteria, each as [dose_difference_%, distance_mm, dose_cutoff_%].
# One figure column + one pass rate is produced per criterion.
gamma_criteria:
  - [1, 1, 10]
  - [2, 2, 10]
  - [3, 3, 10]
  - [1, 2, 3]
  - [1, 3, 0.1]

# Extra pymedphys gamma parameters, merged over the defaults (and over the
# per-criterion dose/distance/cutoff above). Lower interp_fraction = faster but
# slightly less precise; the plan stage defaults to 5 (vs 10 per-beamlet).
gamma_params:
  interp_fraction: 5
  max_gamma: 2
  local_gamma: false
  random_subset: null

# Enable verbose/debug logging.
verbose: false
